<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Basics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
    <nav class="navbar navbar-expand-lg bg-danger mb-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">News Website</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse d-flex justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">World</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Business</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Technology</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Sports</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                  </li>
                </ul>
              </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <div class="col-8 bg-light">Main Story - Large Image & Headline</div>
            <div class="col-4">
                <div class="row">
                    <div class="col-12 bg-secondary text-white">Side Story 1</div>
                    <div class="col-12 bg-secondary text-white">Side Story 2</div>
                    <div class="col-12 bg-secondary text-white">Side Story 3</div>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-3 bg-warning border">Story 1</div>
        <div class="col-3 bg-warning border">Story 2</div>
        <div class="col-3 bg-warning border">Story 3</div>
        <div class="col-3 bg-warning border">Story 4</div>
    </div>
    <div class="row">
        <div class="col-4 bg-info border">Lower Story 1</div>
        <div class="col-4 bg-info border">Lower Story 2</div>
        <div class="col-4 bg-info border">Lower Story 3</div>
    </div>
    <div class="row">
        <div class="col-12 bg-dark text-white text-center p-3">
        <p>&#169 2025 News Website - All Rights Reserved</p>
    </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
